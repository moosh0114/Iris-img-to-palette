<div class="bg-[#252525] rounded-2xl p-6 shadow-lg border border-[#3b3b3b]">
    <h2 class="text-xl font-semibold mb-4 text-center">
        Top 10 Main Colors
        <span class="text-sm font-normal text-gray-400">({{ method }}) for {{ image_filename }}</span>
    </h2>

    <div class="flex flex-wrap gap-4 justify-center">
        {% for color in palette %}
        <div class="flex flex-col items-center">
            <div class="w-20 h-20 rounded-full shadow-md mb-2"
                style="background-color: {{ color.hex }}; border: 1px solid rgba(255,255,255,0.1);">
            </div>
            <div class="text-xs font-mono uppercase text-gray-300 tracking-wider">
                {{ color.hex }}
            </div>
            <div class="text-[10px] font-mono text-gray-500 mt-1">
                rgb({{ color.r }},{{ color.g }},{{ color.b }})
            </div>
        </div>
        {% endfor %}
    </div>
</div>
