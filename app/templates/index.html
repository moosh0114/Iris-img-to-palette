<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iris Img to Palette</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prosto+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', path='css/index.css') }}" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style type="text/tailwindcss">
      @utility btn-main {
        @apply w-full lg:w-45 h-15 my-4 border border-[var(--primary-color-four)] hover:bg-gray-200 duration-600 rounded-xl cursor-pointer;
      }

      @utility btn-num-control {
        @apply h-10 w-10 rounded-md bg-[var(--primary-color-two)] text-2xl text-white;
      }
    </style>
  </head>
  <body class="">
    <div class="w-full max-w-320 mx-auto xl:my-5 p-4" x-data="uploader()">
      <form
        id="extract-form"
        class="flex h-full flex-col gap-4"
        hx-post="/api/extract"
        hx-target="#result"
        hx-swap="innerHTML"
        enctype="multipart/form-data"
        @pointerup.window="stopAdjust()"
        @pointercancel.window="stopAdjust()"
      >
        <input
          x-ref="fileInput"
          id="image-upload"
          class="hidden"
          name="image"
          type="file"
          accept="image/*"
          required
          @change="onPick($event)"
        />

        <input type="hidden" name="n_colors" x-model="nColors" />

        <div
          class="relative min-h-120 max-h-120 flex items-center justify-center p-4 text-center rounded-2xl cursor-pointer bg-[var(--primary-color)]"
          :class="dropActive ? 'ring-2 ring-white/60' : ''"
          @click="$refs.fileInput.click()"
          @dragover.prevent="dropActive = true"
          @dragleave.prevent="dropActive = false"
          @drop.prevent="onDrop($event)"
        >
          <template x-if="!previewUrl">
            <div class="h-full w-full flex items-center justify-center">
              <p class="tracking-wide text-[var(--primary-color-three)]">Upload / Drag Image Here</p>
            </div>
          </template>
          <template x-if="previewUrl">
            <img :src="previewUrl" alt="preview" class="rounded-[16px] object-contain" />
          </template>
        </div>

        <div id="result" class="flex-none rounded-2xl">
          <div class="flex h-full flex-col justify-between gap-4">
            <div class="flex flex-col lg:flex-row flex-wrap items-center justify-between gap-4">
              <button
                type="button"
                class="btn-main iris-shadow-main"
                onclick="copyPaletteJson(this)"
              >
                <span class="text-lg text-[var(--primary-color-two)]">COPY JSON</span>
              </button>

              <div class="flex flex-col sm:flex-row items-center gap-4 uppercase tracking-wide text-[var(--primary-color-two)]">
                <span class="text-2xl">Extract</span>
                <button
                  type="button"
                  class="btn-num-control"
                  @pointerdown.prevent="startAdjust(-1)"
                  @pointerup="stopAdjust()"
                  @pointerleave="stopAdjust()"
                  @pointercancel="stopAdjust()"
                  aria-label="Decrease n_colors"
                >
                  <span class="text-2xl"> - </span>
                </button>
                <span class="text-center text-2xl text-[var(--primary-color-three)]" x-text="nColors"></span>
                <button
                  type="button"
                  class="btn-num-control"
                  @pointerdown.prevent="startAdjust(1)"
                  @pointerup="stopAdjust()"
                  @pointerleave="stopAdjust()"
                  @pointercancel="stopAdjust()"
                  aria-label="Increase n_colors"
                >
                  <span class="text-2xl"> + </span>
                </button>
                <span class="text-2xl">Color</span>
              </div>

              <button
                type="submit"
                class="btn-main iris-shadow-main"
              >
                <span class="text-2xl text-[var(--primary-color-two)]">GO</span>
              </button>

              <div class="w-full grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2">
                {% for _ in range(12) %}
                  <div class="h-16 sm:h-22 rounded-xl bg-[var(--primary-color)]"></div>
                {% endfor %}
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>

    <script src="{{ url_for('static', path='js/index.js') }}"></script>
  </body>
</html>
