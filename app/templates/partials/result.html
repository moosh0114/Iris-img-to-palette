<div class="flex h-full flex-col justify-between gap-4">
  <div class="flex flex-col lg:flex-row flex-wrap items-center justify-between gap-x-4 gap-y-8 lg:gap-y-4">
    <div class="iris-export-dock order-3 lg:order-1 w-full lg:w-45 mt-[10px] lg:mt-0">
      <button
        type="button"
        class="btn-main iris-action-btn iris-shadow-main my-0"
        onclick="copyPaletteJson(this)"
      >
        <span class="text-lg iris-action-text">COPY JSON</span>
      </button>
      <button
        type="button"
        class="btn-main iris-action-btn iris-shadow-main my-0 iris-export-btn"
        onclick="exportPaletteTxt(this)"
      >
        <span class="text-lg iris-action-text">EXPORT .txt</span>
      </button>
    </div>

    <div class="iris-extract-group order-1 lg:order-2 flex flex-row items-center gap-3 uppercase tracking-wide">
      <span class="text-2xl iris-extract-label">Extract</span>
      <select
        class="h-10 rounded-md border border-[var(--primary-color-four)] bg-[var(--action-btn-bg)] px-2 text-sm uppercase tracking-wide text-[var(--action-btn-fg)]"
        x-model="extractMethod"
        aria-label="Extraction method"
      >
        <option value="kmeans">KMeans</option>
        <option value="model">Model</option>
      </select>
      <button
        type="button"
        class="btn-num-control"
        @pointerdown.prevent="startAdjust(-1)"
        @pointerup="stopAdjust()"
        @pointerleave="stopAdjust()"
        @pointercancel="stopAdjust()"
        aria-label="Decrease n_colors"
      >
        <span class="text-2xl"> - </span>
      </button>
      <span class="text-center text-2xl iris-extract-label" x-text="nColors"></span>
      <button
        type="button"
        class="btn-num-control"
        @pointerdown.prevent="startAdjust(1)"
        @pointerup="stopAdjust()"
        @pointerleave="stopAdjust()"
        @pointercancel="stopAdjust()"
        aria-label="Increase n_colors"
      >
        <span class="text-2xl"> + </span>
      </button>
      <span class="text-2xl iris-extract-label">Color</span>
    </div>

    <button
      type="submit"
      form="extract-form"
      class="order-2 lg:order-3 btn-main my-0 iris-action-btn iris-shadow-main"
      :disabled="totalFiles === 0"
    >
      <span class="text-2xl iris-action-text" x-text="isWorking ? 'WORKING' : 'GO'"></span>
    </button>

    <div id="desktop-swatches" class="order-4 w-full hidden lg:grid {% if (result.n_colors|default(10)) >= 11 %}grid-cols-6{% else %}grid-cols-5{% endif %} gap-4">
      {% for c in result.palette %}
        <div class="palette-swatch flex h-16 sm:h-22 min-w-0 items-center justify-center rounded-xl px-2 text-center text-lg tracking-wide iris-shadow-main" data-hex="{{ c.hex }}" style="--swatch-left: {{ c.hex }};">
          <span class="palette-label">{{ c.hex|replace('#', '')|upper }}</span>
        </div>
      {% endfor %}
      {% for _ in range((result.n_colors|default(10)) - (result.palette|length)) %}
        <div class="h-16 sm:h-22 rounded-xl iris-swatch-empty"></div>
      {% endfor %}
    </div>
  </div>

  <pre id="palette-json" class="hidden">{{ result.palette_json_pretty }}</pre>
  <script id="palettes-data" type="application/json">{{ result.palettes_json|default('[]')|safe }}</script>
</div>
